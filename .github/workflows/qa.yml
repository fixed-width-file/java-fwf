name: QA & CI

on:
  push:
    branches:
      - "*"
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19

      - name: Run Semgrep SAST
        if: github.event_name == 'pull_request' || github.event_name == 'schedule'
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  test:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21', '25']

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Fetch compliance test cases
        run: |
          mkdir -p src/test/resources/fwf-compliance
          curl -sL "https://github.com/fixed-width-file/fwf-compliance-tests/archive/refs/heads/main.zip" -o compliance.zip
          unzip -q compliance.zip
          cp -r fwf-compliance-tests-main/cases src/test/resources/fwf-compliance/
          cp fwf-compliance-tests-main/manifest.json src/test/resources/fwf-compliance/
          rm -rf compliance.zip fwf-compliance-tests-main

      - name: Build and Test with JaCoCo Coverage
        run: |
          mvn clean verify

      - name: Upload JaCoCo Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-java${{ matrix.java-version }}
          path: target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' || github.event_name == 'schedule'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
          flags: java${{ matrix.java-version }}
          fail_ci_if_error: false

  publish:
    name: Publish to Maven Central Portal
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Import GPG Key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish Package to Sonatype Central
        if: ${{ secrets.MAVEN_CENTRAL_USERNAME != '' }}
        run: mvn clean deploy -P release -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
